<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Light blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#EBF5FB"/>

  <!-- Barrel interior (light blue half-circle fill) -->
  <path d="M 13,7 C 9.3,7 7,9.7 7,13 C 7,16.3 9.3,19 13,19 Z"
        fill="#90CAF9"/>

  <!-- Main light-blue wave body (transition from curl to stripes) -->
  <path d="M 13,3 C 7.5,3 3,7.5 3,13 C 3,18.5 7.5,23 13,23
           C 16,23 19,22 21,20 C 24,21 27,22.5 30,24.5
           L 30,23 C 27,21 24,19.5 21,18.5 C 22,17 23,15 23,13
           C 23,7.5 18.5,3 13,3 Z"
        fill="#64B5F6" opacity="0.5"/>

  <!-- Dark navy C-curl ring (outer arc) -->
  <path d="M 13,3
           C 7.5,3 3,7.5 3,13
           C 3,18.5 7.5,23 13,23
           L 13,19
           C 10,19 7.5,16.3 7.5,13
           C 7.5,9.7 10,7 13,7
           Z"
        fill="#0D47A1"/>

  <!-- White foam at crest -->
  <path d="M 13,3 C 17,3 20.5,5.5 21,9 C 19,7 16.5,5 13,4.5 Z"
        fill="white" opacity="0.95"/>

  <!-- Stripe 1 — dark navy -->
  <path d="M 11,21 C 17,19.5 23,21 29,23 L 29,25.5 C 23,23.5 17,22 11,23.5 Z"
        fill="#0D47A1"/>

  <!-- Stripe 2 — medium blue -->
  <path d="M 10,24.5 C 16.5,23 22.5,24.5 28.5,26.5 L 28.5,29 C 22.5,27 16.5,25.5 10,27 Z"
        fill="#1565C0"/>

  <!-- Stripe 3 — light blue -->
  <path d="M 9,28 C 15.5,26.5 22,28 28,30 L 28,32 C 22,30 15.5,28.5 9,30 Z"
        fill="#1E88E5"/>

  <!-- White highlights on stripes -->
  <path d="M 14,22.5 Q 21,21.5 27,23.5" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.55"/>
  <path d="M 13,26 Q 20,25 26,27" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.55"/>

  <!-- Water droplets (light blue) -->
  <circle cx="22" cy="7.5" r="1.3" fill="#90CAF9"/>
  <circle cx="24.5" cy="4.5" r="1.6" fill="#90CAF9"/>
  <circle cx="27" cy="8.5" r="1.1" fill="#90CAF9"/>
</svg>
