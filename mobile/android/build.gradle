// Plugin versions are declared in settings.gradle via pluginManagement.
// kotlin_version is kept here so app/build.gradle can reference $kotlin_version.
ext {
    kotlin_version = '2.3.10'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
