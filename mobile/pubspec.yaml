name: cebusafetour
description: CebuSafeTour - Tourist Safety Mobile App for Cebu, Philippines

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.5
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # HTTP & API
  dio: ^5.7.0
  dio_cache_interceptor: ^4.0.5
  retrofit: ^4.1.0

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # Maps
  google_maps_flutter: ^2.7.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_messaging: ^16.1.2
  cloud_firestore: ^6.1.3

  # UI components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.14

  # Utilities
  path: ^1.9.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  image_picker: ^1.1.4
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  uuid: ^4.5.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
